<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=https://literaryrides.com/privacy-policy/" />
  <title>Privacy Policy has moved — Literary Rides VocabPro</title>
  <meta name="description" content="The Literary Rides VocabPro privacy policy has moved to literaryrides.com/privacy-policy/." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://literaryrides.com/privacy-policy/" />
  <link rel="icon" type="image/png" href="/vocabpro/icons/icon-192.png" />
  <style>
    :root {
      --bg: #0f0d1a; --surface: #1a1730; --border: #2d2a4a;
      --purple: #7c3aed; --purple-light: #a78bfa; --blue: #3b82f6;
      --text: #e2e8f0; --text-muted: #94a3b8;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      font-size: 16px; line-height: 1.7; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    main {
      max-width: 520px; width: 100%; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 32px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 26px; font-weight: 800; margin-bottom: 12px;
      background: linear-gradient(135deg, var(--purple-light), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    p { color: var(--text-muted); font-size: 15px; margin-bottom: 24px; }
    .cta {
      display: inline-block; padding: 14px 28px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff; font-size: 16px; font-weight: 600; text-decoration: none;
    }
    .cta:hover { opacity: 0.9; }
    .back { display: block; margin-top: 24px; color: var(--purple-light); font-size: 14px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    @media (max-width: 600px) { main { padding: 36px 20px; } h1 { font-size: 22px; } }
  </style>
</head>
<body>
<main>
  <div class="icon">🔒</div>
  <h1>Our Privacy Policy has moved</h1>
  <p>The Literary Rides VocabPro privacy policy now lives on our main site. You should be redirected automatically.</p>
  <a class="cta" href="https://literaryrides.com/privacy-policy/">Read the Privacy Policy</a>
  <a class="back" href="/vocabpro/">← Back to VocabPro</a>
</main>
</body>
</html>
